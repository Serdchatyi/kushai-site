<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Оплата прошла — КушАИ</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0A0A0A; color: #F0F0F0;
      font-family: -apple-system, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .card {
      background: #141414; border: 1px solid #2A2A2A;
      border-radius: 24px; padding: 48px 40px;
      max-width: 420px; width: 100%;
      text-align: center;
    }
    .icon {
      width: 80px; height: 80px; border-radius: 50%;
      background: rgba(200,240,96,0.12);
      display: flex; align-items: center; justify-content: center;
      font-size: 38px; margin: 0 auto 24px;
    }
    h1 {
      font-size: 28px; font-weight: 800; letter-spacing: -0.5px;
      color: #C8F060; margin-bottom: 12px;
    }
    p {
      color: #666; font-size: 15px; line-height: 1.6; margin-bottom: 8px;
    }
    .hint {
      margin-top: 32px;
      background: #1E1E1E; border-radius: 14px; padding: 16px 20px;
      color: #888; font-size: 13px; line-height: 1.6;
    }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      margin-top: 32px;
      background: #C8F060; color: #0A0A0A;
      font-weight: 700; font-size: 15px;
      padding: 13px 28px; border-radius: 14px;
      text-decoration: none;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="icon">✅</div>
  <h1>Оплата прошла!</h1>
  <p>Pro-доступ активирован на 30 дней.</p>
  <p>Вернитесь в приложение — статус обновится автоматически.</p>

  <div class="hint">
    Если Pro не активировался — выйдите из приложения и войдите снова, или напишите нам на
    <a href="mailto:support@kushai.online" style="color:#C8F060">support@kushai.online</a>
  </div>

  <a class="btn" href="https://play.google.com/store/apps/details?id=com.kushai.kushai">
    Открыть приложение
  </a>
</div>

</body>
</html>
